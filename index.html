<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fdf6f0;
  text-align: center;
}

/* ===== INTRO CINEMATIC ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #2b0000, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  z-index: 9999;
  transition: opacity 1s ease, transform 1s ease;
}

/* ⭐ BASE STARS */
#intro::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;

  background-image:
    radial-gradient(circle, rgba(255,215,0,0.9) 2px, transparent 2px),
    radial-gradient(circle, rgba(255,255,255,0.8) 1.5px, transparent 2px);

  background-size: 80px 80px, 120px 120px;
  background-position: 0 0, 40px 40px;
}

/* ✨ TWINKLING STARS */
#intro::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background-image:
    radial-gradient(circle, #fff 1px, transparent 1px);
  background-size: 60px 60px;
  animation: twinkle 2s infinite alternate;
  opacity: 0.7;
}

@keyframes twinkle {
  from { opacity: 0.3; }
  to { opacity: 1; }
}

/* 🌠 SHOOTING STAR */
.shooting-star {
  position: absolute;
  width: 2px;
  height: 80px;
  background: linear-gradient(-45deg, white, transparent);
  opacity: 0;
  transform: rotate(45deg);
  animation: shoot 6s linear infinite;
}

.shooting-star:nth-child(1) { top: 10%; left: 20%; animation-delay: 1s; }
.shooting-star:nth-child(2) { top: 30%; left: 70%; animation-delay: 3s; }
.shooting-star:nth-child(3) { top: 60%; left: 40%; animation-delay: 5s; }

@keyframes shoot {
  0% { opacity: 0; transform: translate(0,0) rotate(45deg); }
  10% { opacity: 1; }
  100% { opacity: 0; transform: translate(300px,300px) rotate(45deg); }
}

/* 💎 INTRO BOX */
.intro-box {
  position: relative;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 25px;
  padding: 45px 35px;
  box-shadow: 0 25px 80px rgba(0,0,0,0.7);
  border: 1px solid rgba(255,215,0,0.3);
  z-index: 2;
  animation: zoomIn 1.5s ease;
}

@keyframes zoomIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.intro-title {
  font-family: 'Playfair Display', serif;
  color: #fff;
}

.intro-sub {
  color: white;
  margin-bottom: 20px;
}

.open-btn {
  padding: 14px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, gold, #ffcc70);
  cursor: pointer;
  font-weight: bold;
}

/* HERO */
.hero {
  background: url('image1.jpg') center/cover no-repeat;
  height: 100vh;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding-top: 90px;
  background-color: rgba(0,0,0,0.5);
  background-blend-mode: darken;
}

/* SECTION */
.section { padding: 50px 20px; }

/* COUNTDOWN */
.count-box {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
}

.count-box div {
  background: white;
  padding: 18px;
  border-radius: 15px;
  min-width: 80px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  font-weight: bold;
}

/* GALLERY */
.slider { width: 90%; margin: auto; overflow: hidden; border-radius: 15px; }
.slides { display: flex; transition: transform 0.6s ease-in-out; }
.slides img { width: 100%; flex-shrink: 0; }

/* BUTTON */
.button {
  padding: 14px 22px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 30px;
}

/* MUSIC */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px;
  border-radius: 50%;
  background: black;
  color: white;
  border: none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">

  <!-- shooting stars -->
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>

  <div class="intro-box">
    <h2 class="intro-title">Praboda ❤️ Dewmi</h2>
    <p class="intro-sub">YOU ARE INVITED</p>
    <button class="open-btn" onclick="openInvite()">Open Invitation</button>
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="hero">
  <h1>Praboda ❤️ Dewmi</h1>
  <h2 id="guestText">We are getting married</h2>
</div>

<div class="section" style="background:black;color:white;">
  <h2>Save The Date</h2>
  <h1>16 • 07 • 2026</h1>
</div>

<div class="section">
  <h2>Wedding Details</h2>
  <p>📅 16th July 2026</p>
  <p>⏰ 10:00 AM – 4:00 PM</p>
  <p>📍 Hotel Nildiya, Matara</p>
  <div id="countdown" class="count-box"></div>
</div>

<div class="section">
  <h2>Gallery</h2>
  <div class="slider">
    <div class="slides" id="slides">
      <img src="image1.jpg">
      <img src="image2.jpg">
      <img src="image3.jpg">
    </div>
  </div>
</div>

<div class="section">
  <h2>Location</h2>
  <iframe src="https://maps.google.com/maps?q=Hotel%20Nildiya%20Matara&output=embed"
  width="90%" height="250" style="border-radius:15px;"></iframe>
</div>

<div class="section">
  <h2>RSVP</h2>
  <a class="button" id="rsvpBtn" href="#">Confirm via WhatsApp</a>
</div>

<div class="section">
  <p>With Love ❤️<br>Praboda & Dewmi</p>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* OPEN INVITE - CINEMATIC + GOLD BURST */
function openInvite() {
  const intro = document.getElementById("intro");

  intro.style.opacity = "0";
  intro.style.transform = "scale(1.1)";

  setTimeout(() => {
    intro.style.display = "none";
    document.getElementById("music").play();

    /* 💛 GOLD BURST */
    confetti({
      particleCount: 200,
      spread: 100,
      colors: ['#FFD700', '#FFEC8B', '#FFF8DC']
    });

  }, 1000);
}

/* MUSIC */
function toggleMusic() {
  var m = document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

/* COUNTDOWN */
var countDownDate = new Date("July 16, 2026 10:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var d = countDownDate - now;

  var days = Math.floor(d / (1000 * 60 * 60 * 24));
  var hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    `<div>${days}<br>Days</div>
     <div>${hours}<br>Hours</div>
     <div>${minutes}<br>Min</div>`;
}, 1000);

/* PERSONALIZED NAME */
const params = new URLSearchParams(window.location.search);
const guest = params.get("name");

if (guest) {
  document.getElementById("guestText").innerHTML =
    "Dear " + guest + ", you are invited 💌";

  document.getElementById("rsvpBtn").href =
    "https://wa.me/94772636665?text=Hi Praboda & Dewmi, I (" + guest + ") will attend your wedding!";
} else {
  document.getElementById("rsvpBtn").href =
    "https://wa.me/94772636665?text=Hi Praboda & Dewmi, I will attend your wedding!";
}

/* SLIDER */
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = slides.children.length;

setInterval(() => {
  index = (index + 1) % totalSlides;
  slides.style.transform = `translateX(-${index * 100}%)`;
}, 3000);

</script>

</body>
</html>
