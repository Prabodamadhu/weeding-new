<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fdf6f0;
  text-align: center;
}

/* ===== INTRO ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #2b0000, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  z-index: 9999;
  transition: opacity 1s ease, transform 1s ease;
}

/* STARS */
#intro::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background-image:
    radial-gradient(circle, rgba(255,215,0,0.9) 2px, transparent 2px),
    radial-gradient(circle, rgba(255,255,255,0.8) 1.5px, transparent 2px);
  background-size: 80px 80px, 120px 120px;
}

#intro::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(circle, #fff 1px, transparent 1px);
  background-size: 60px 60px;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.3; }
  to { opacity: 1; }
}

/* SHOOTING STARS */
.shooting-star {
  position: absolute;
  width: 2px;
  height: 80px;
  background: linear-gradient(-45deg, white, transparent);
  transform: rotate(45deg);
  animation: shoot 6s linear infinite;
}
.shooting-star:nth-child(1){top:10%;left:20%;animation-delay:1s;}
.shooting-star:nth-child(2){top:40%;left:70%;animation-delay:3s;}
.shooting-star:nth-child(3){top:70%;left:40%;animation-delay:5s;}

@keyframes shoot {
  0% { opacity:0; }
  10% { opacity:1; }
  100% { opacity:0; transform: translate(300px,300px) rotate(45deg);}
}

/* INTRO BOX */
.intro-box {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 25px;
  padding: 45px;
  border: 1px solid rgba(255,215,0,0.3);
  z-index: 2;
}

/* BUTTON */
.open-btn {
  padding: 14px 30px;
  border-radius: 50px;
  border: none;
  font-weight: bold;
  background: linear-gradient(45deg, gold, #ffcc70);
  cursor: pointer;
  transition: all 0.3s ease;
}

.open-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px gold;
}

/* HERO */
.hero {
  background: url('image1.jpg') center/cover no-repeat;
  height: 100vh;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding-top: 90px;
  background-color: rgba(0,0,0,0.5);
  background-blend-mode: darken;
}

/* GLASS SECTIONS */
.section {
  padding: 50px 20px;
  margin: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* COUNTDOWN */
.count-box {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
}

.count-box div {
  background: white;
  padding: 18px;
  border-radius: 15px;
}

/* GALLERY */
.slider { width:90%; margin:auto; overflow:hidden; border-radius:15px; }
.slides { display:flex; transition:transform 0.6s ease-in-out; }
.slides img { width:100%; }

/* BUTTON */
.button {
  padding:14px 22px;
  background:black;
  color:white;
  border-radius:30px;
  text-decoration:none;
}

/* MUSIC */
.music-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px;
  border-radius:50%;
  background:black;
  color:white;
  border:none;
}

/* MOBILE */
h1 { font-size:28px; }
h2 { font-size:20px; }

@media (max-width:600px){
  .count-box { flex-direction:column; }
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>

  <div class="intro-box">
    <h2 style="color:white;">Praboda ❤️ Dewmi</h2>
    <p style="color:white;">YOU ARE INVITED</p>
    <button class="open-btn" onclick="openInvite()">Open Invitation</button>
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<div class="hero">
  <h1>Praboda ❤️ Dewmi</h1>
  <h2 id="guestText"></h2>
</div>

<!-- SAVE DATE -->
<div class="section">
  <h2>Save The Date</h2>
  <h1>16 • 07 • 2026</h1>
</div>

<!-- DETAILS -->
<div class="section">
  <h2>Wedding Details</h2>
  <p>📅 16th July 2026</p>
  <p>⏰ 10:00 AM – 4:00 PM</p>
  <p>📍 Hotel Nildiya, Matara</p>
  <div id="countdown" class="count-box"></div>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>Gallery</h2>
  <div class="slider">
    <div class="slides" id="slides">
      <img src="image1.jpg">
      <img src="image2.jpg">
      <img src="image3.jpg">
    </div>
  </div>
</div>

<!-- LOCATION -->
<div class="section">
  <h2>Location</h2>
  <iframe src="https://maps.google.com/maps?q=Hotel%20Nildiya%20Matara&output=embed"
  width="90%" height="250" style="border-radius:15px;"></iframe>
</div>

<!-- RSVP -->
<div class="section">
  <h2>RSVP</h2>
  <a class="button" id="rsvpBtn" href="#">Confirm via WhatsApp</a>
</div>

<!-- FOOTER -->
<div class="section">
  <p>With Love ❤️<br>Praboda & Dewmi</p>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* OPEN INVITE */
function openInvite() {
  const intro = document.getElementById("intro");

  intro.style.opacity = "0";
  intro.style.transform = "scale(1.1)";

  setTimeout(() => {
    intro.style.display = "none";
    startMusicFade();

    confetti({
      particleCount: 200,
      spread: 100,
      colors: ['#FFD700','#FFF8DC','#FFEC8B']
    });

  }, 1000);
}

/* MUSIC FADE */
function startMusicFade() {
  const music = document.getElementById("music");
  music.volume = 0;
  music.play();

  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.05;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);
}

/* SCROLL ANIMATION */
const sections = document.querySelectorAll(".section");
window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
});

/* COUNTDOWN */
var countDownDate = new Date("July 16, 2026 10:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var d = countDownDate - now;

  document.getElementById("countdown").innerHTML =
    `<div>${Math.floor(d/(1000*60*60*24))}<br>Days</div>
     <div>${Math.floor((d%(1000*60*60*24))/(1000*60*60))}<br>Hours</div>
     <div>${Math.floor((d%(1000*60*60))/(1000*60))}<br>Min</div>`;
}, 1000);

/* TYPING EFFECT */
const params = new URLSearchParams(window.location.search);
const guest = params.get("name") || "Dear Guest";

const text = "Dear " + guest + ", you are invited 💌";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("guestText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 50);
  }
}
typeEffect();

document.getElementById("rsvpBtn").href =
  "https://wa.me/94772636665?text=Hi Praboda & Dewmi, I (" + guest + ") will attend your wedding!";

/* SLIDER */
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = slides.children.length;

setInterval(() => {
  index = (index + 1) % totalSlides;
  slides.style.transform = `translateX(-${index * 100}%)`;
}, 3000);

/* MUSIC */
function toggleMusic(){
  var m=document.getElementById("music");
  m.paused?m.play():m.pause();
}

</script>

</body>
</html>
