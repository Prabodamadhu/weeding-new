<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: #fdf6f0;
}

/* ===== INTRO (UNCHANGED) ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #1a1a1a, #4b0000);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  z-index: 9999;
}

#intro::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(#ffd700 1px, transparent 1px);
  background-size: 40px 40px;
  animation: move 25s linear infinite;
  opacity: 0.3;
}

@keyframes move {
  from {transform: translateY(0);}
  to {transform: translateY(-300px);}
}

/* SHIMMER */
.shimmer {
  background: linear-gradient(90deg,#d4af37,#fff,#ffd700,#d4af37);
  background-size: 200%;
  -webkit-background-clip: text;
  color: transparent;
  animation: shine 3s linear infinite;
}
@keyframes shine { to {background-position:200%;} }

.heart { color:red; }

.intro-box {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  padding: 40px;
  border-radius: 20px;
}

.open-btn {
  padding: 12px 25px;
  border:none;
  border-radius:25px;
  background: gold;
  cursor:pointer;
}

/* ===== HERO ===== */
.hero {
  background:url('image1.jpg') center/cover no-repeat;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  padding-top:100px;
  color:white;
  background-color:rgba(0,0,0,0.5);
  background-blend-mode:darken;
}

.hero h1 { font-size:36px; }
.hero h2 { font-size:18px; }

/* ===== SECTION ===== */
.section {
  padding:60px 20px;
}

/* ===== COUNTDOWN (PRO) ===== */
.count-box {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.count-box div {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:15px;
  min-width:80px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  font-weight:bold;
}

/* ===== GALLERY (PRO) ===== */
.slider {
  width:90%;
  margin:auto;
  overflow:hidden;
}

.slides img {
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* ===== LOCATION (PRO) ===== */
.map-box {
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  width:90%;
  margin:auto;
}

iframe {
  border-radius:15px;
}

/* ===== BUTTON ===== */
.button {
  padding:15px 25px;
  background:black;
  color:white;
  border-radius:30px;
  text-decoration:none;
}

/* MUSIC */
.music-btn {
  position:fixed;
  bottom:20px;
  right:20px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-box">
    <h2>
      <span class="shimmer">Praboda</span>
      <span class="heart"> ❤️ </span>
      <span class="shimmer">Dewmi</span>
    </h2>
    <p style="color:white;">YOU ARE INVITED</p>
    <button class="open-btn" onclick="openInvite()">Open Invitation</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>
    <span class="shimmer">Praboda</span>
    <span class="heart"> ❤️ </span>
    <span class="shimmer">Dewmi</span>
  </h1>
  <h2>We are getting married</h2>
</div>

<!-- COUNTDOWN -->
<div class="section">
  <h2>Wedding Countdown</h2>
  <div id="countdown" class="count-box"></div>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>Gallery</h2>
  <div class="slider">
    <div class="slides" id="slides">
      <img src="image1.jpg">
      <img src="image2.jpg">
      <img src="image3.jpg">
    </div>
  </div>
</div>

<!-- LOCATION -->
<div class="section">
  <h2>Location</h2>
  <div class="map-box">
    <iframe src="https://maps.google.com/maps?q=Hotel%20Nildiya%20Matara&output=embed"
    width="100%" height="250"></iframe>
  </div>
</div>

<script>

function openInvite(){
  document.getElementById("intro").style.display="none";
}

let countDownDate = new Date("July 16, 2026 10:00:00").getTime();

setInterval(()=>{
  let now = new Date().getTime();
  let d = countDownDate-now;

  let days = Math.floor(d/(1000*60*60*24));
  let hours = Math.floor((d%(1000*60*60*24))/(1000*60*60));
  let mins = Math.floor((d%(1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML =
  `<div>${days}<br>Days</div>
   <div>${hours}<br>Hours</div>
   <div>${mins}<br>Min</div>`;
},1000);

</script>

</body>
</html>
