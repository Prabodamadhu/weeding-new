<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>

/* ===== GENERAL ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
}

/* ===== FIRST PAGE (ROYAL SEAL) ===== */
#firstPage {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg,#8b1a1a,#5e0e0e);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.invitation-card {
  background: #fff5eb;
  padding: 40px;
  border-radius: 40px;
  text-align: center;
}

.seal-circle {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  background: radial-gradient(circle,#ffd700,#c1851e);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 20px auto;
  cursor: pointer;
}

/* ===== SECOND PAGE ===== */
#mainPage {
  display: none;
}

/* ===== INTRO (ENVELOPE PAGE) ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #f28b8b;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 5000;
}

.envelope {
  width: 280px;
  height: 180px;
  background: #8B0000;
  position: relative;
  border-radius: 12px;
  overflow: hidden;
}

.envelope::before {
  content:'';
  position:absolute;
  top:40%;
  width:100%;
  height:20px;
  background:linear-gradient(45deg,#FFD700,#FFC107);
  z-index:3;
}

.seal {
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:70px;height:70px;
  background:radial-gradient(circle,#FFD700,#FFA500);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

.flap {
  position:absolute;
  width:100%;height:100%;
  background:#700000;
  clip-path:polygon(0 0,100% 0,50% 55%);
  transition:.8s;
}

.letter {
  position:absolute;
  width:90%;
  height:90%;
  background:white;
  top:5%;left:5%;
  transform:translateY(100%);
  transition:.8s;
  display:flex;
  justify-content:center;
  align-items:center;
}

.open .flap { transform:rotateX(180deg); }
.open .letter { transform:translateY(0); }

/* HERO */
.hero {
  background: url('image3.jpg') center/cover no-repeat;
  height: 100vh;
  color: white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background-color: rgba(0,0,0,0.5);
  background-blend-mode: darken;
}

/* SECTION */
.section { padding:40px; text-align:center; }

/* BUTTON */
.button {
  padding:12px 20px;
  background:black;
  color:white;
  text-decoration:none;
  border-radius:30px;
}

/* MUSIC */
.music-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px;
}

</style>
</head>

<body>

<!-- FIRST PAGE -->
<div id="firstPage">
  <div class="invitation-card">
    <h2>Praboda & Dewmi</h2>
    <p>Royal Invitation</p>
    <div class="seal-circle" onclick="openMain()">OPEN</div>
  </div>
</div>

<!-- SECOND PAGE -->
<div id="mainPage">

<!-- ENVELOPE INTRO -->
<div id="intro" onclick="openInvite()">
  <div class="envelope">
    <div class="flap"></div>
    <div class="seal">P&D</div>
    <div class="letter">Tap to Open</div>
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<div class="hero">
  <h1>Praboda ❤️ Dewmi</h1>
  <h2 id="guestText">We are getting married</h2>
</div>

<div class="section">
  <h2>Wedding Details</h2>
  <p>📅 16 July 2026</p>
  <p>⏰ 10 AM</p>
  <p>📍 Hotel Nildiya</p>
</div>

<div class="section">
  <a id="rsvpBtn" class="button">RSVP</a>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* OPEN FIRST PAGE */
function openMain(){
  document.getElementById("firstPage").style.display="none";
  document.getElementById("mainPage").style.display="block";

  confetti({particleCount:150,spread:80});
}

/* OPEN ENVELOPE */
function openInvite(){
  document.querySelector('.envelope').classList.add('open');

  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("music").play();
  },1000);
}

/* MUSIC */
function toggleMusic(){
  let m=document.getElementById("music");
  m.paused?m.play():m.pause();
}

/* PERSONAL NAME */
const guest=new URLSearchParams(window.location.search).get("name");

if(guest){
  document.getElementById("guestText").innerHTML="Dear "+guest+", you are invited 💌";
  document.getElementById("rsvpBtn").href="https://wa.me/94772636665?text=Hi I ("+guest+") will attend";
}else{
  document.getElementById("rsvpBtn").href="https://wa.me/94772636665?text=I will attend";
}

</script>

</body>
</html>
