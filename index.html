<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fdf6f0;
  color: #5a4a42;
  text-align: center;
}

/* ===== PREMIUM INTRO BACKGROUND ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #a83232, #5e0e0e);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.invite-container {
  text-align: center;
}

.invite-text {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  margin-bottom: 20px;
  color: #FFD700;
  letter-spacing: 2px;
}

/* ===== ENVELOPE (PRO LEVEL) ===== */
.envelope {
  width: 300px;
  height: 190px;
  background: linear-gradient(145deg, #7a0000, #4d0000);
  position: relative;
  border-radius: 14px;
  box-shadow:
    0 15px 35px rgba(0,0,0,0.4),
    inset 0 2px 6px rgba(255,255,255,0.1);
  overflow: hidden;
}

/* GOLD BAND */
.envelope::before {
  content: '';
  position: absolute;
  top: 42%;
  width: 100%;
  height: 22px;
  background: linear-gradient(90deg,#d4af37,#ffd700,#fff2a8,#ffd700,#b8962e);
  box-shadow:
    0 2px 6px rgba(0,0,0,0.3),
    inset 0 1px 2px rgba(255,255,255,0.6);
  z-index: 3;
}

/* SEAL */
.seal {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 75px;
  height: 75px;
  background: radial-gradient(circle at 30% 30%, #ffd700, #c99700);
  border-radius: 50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: 'Playfair Display', serif;
  color:#5c0000;
  font-size:12px;
  font-weight:bold;
  z-index:4;
  box-shadow:
    0 6px 15px rgba(0,0,0,0.4),
    inset 0 2px 4px rgba(255,255,255,0.7),
    inset 0 -3px 6px rgba(0,0,0,0.3);
}

/* FLAP */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #5a0000, #300000);
  clip-path: polygon(0 0, 100% 0, 50% 55%);
  transform-origin: top;
  transition: 0.9s ease;
  z-index: 2;
}

/* LETTER */
.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: linear-gradient(#fff, #f9f9f9);
  top: 5%;
  left: 5%;
  border-radius: 10px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transform: translateY(100%);
  transition: 0.9s ease;
}

/* OPEN EFFECT */
.open .flap { transform: rotateX(180deg); }
.open .letter { transform: translateY(0); }

/* HERO */
.hero {
  background: url('image3.jpg') center/cover no-repeat;
  height: 100vh;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background-blend-mode: darken;
  background-color: rgba(0,0,0,0.5);
}

/* SECTION */
.section { padding: 40px 20px; }
.section:nth-child(even) { background: #fff; }
.section:nth-child(odd) { background: #f8efe8; }

/* COUNTDOWN */
.count-box {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.count-box div {
  background: white;
  padding: 15px;
  border-radius: 12px;
  min-width: 70px;
}

/* GALLERY */
.slider {
  width: 90%;
  margin: auto;
  overflow: hidden;
  border-radius: 15px;
}

.slides {
  display: flex;
  transition: transform 0.4s ease-in-out;
}

.slides img {
  width: 100%;
  flex-shrink: 0;
  border-radius: 15px;
}

/* BUTTON */
.button {
  padding: 14px 22px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 30px;
}

/* MUSIC */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px;
  border-radius: 50%;
  background: black;
  color: white;
  border: none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="invite-container" onclick="openInvite()">
    <div class="invite-text">You’re Invited 💌</div>
    <div class="envelope">
      <div class="flap"></div>
      <div class="seal">P & D</div>
      <div class="letter">
        <h2>Praboda ❤️ Dewmi</h2>
        <p>Tap to Open</p>
      </div>
    </div>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<div class="hero">
  <h1>Praboda ❤️ Dewmi</h1>
  <h2 id="guestText">We are getting married</h2>
</div>

<!-- SAVE DATE -->
<div class="section" style="background:black;color:white;">
  <h2>Save The Date</h2>
  <h1>16 • 07 • 2026</h1>
</div>

<!-- DETAILS -->
<div class="section">
  <h2>Wedding Details</h2>
  <p>📅 16th July 2026</p>
  <p>⏰ 10:00 AM – 4:00 PM</p>
  <p>📍 Hotel Nildiya, Matara</p>
  <div id="countdown" class="count-box"></div>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>Gallery</h2>
  <div class="slider">
    <div class="slides" id="slides">
      <img src="image1.jpg">
      <img src="image2.jpg">
      <img src="image3.jpg">
    </div>
  </div>
</div>

<!-- LOCATION -->
<div class="section">
  <h2>Location</h2>
  <iframe src="https://maps.google.com/maps?q=Hotel%20Nildiya%20Matara&output=embed"
  width="90%" height="250" style="border-radius:10px;"></iframe>
</div>

<!-- RSVP -->
<div class="section">
  <h2>RSVP</h2>
  <a class="button" id="rsvpBtn" href="#">Confirm via WhatsApp</a>
</div>

<!-- FOOTER -->
<div class="section">
  <p>With Love ❤️<br>Praboda & Dewmi</p>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* OPEN INVITE */
function openInvite() {
  document.querySelector('.envelope').classList.add('open');

  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("music").play();
    confetti({ particleCount: 150, spread: 90 });
  }, 1200);
}

/* MUSIC */
function toggleMusic() {
  var m = document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

/* COUNTDOWN */
var countDownDate = new Date("July 16, 2026 10:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var d = countDownDate - now;

  var days = Math.floor(d / (1000 * 60 * 60 * 24));
  var hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    `<div>${days}<br>Days</div>
     <div>${hours}<br>Hours</div>
     <div>${minutes}<br>Min</div>`;
}, 1000);

/* PERSONALIZED NAME */
const params = new URLSearchParams(window.location.search);
const guest = params.get("name");

if (guest) {
  document.getElementById("guestText").innerHTML =
    "Dear " + guest + ", you are invited 💌";

  document.getElementById("rsvpBtn").href =
    "https://wa.me/94772636665?text=Hi Praboda & Dewmi, I (" + guest + ") will attend your wedding!";
} else {
  document.getElementById("rsvpBtn").href =
    "https://wa.me/94772636665?text=Hi Praboda & Dewmi, I will attend your wedding!";
}

/* SLIDER */
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = slides.children.length;

setInterval(() => {
  index = (index + 1) % totalSlides;
  slides.style.transform = `translateX(-${index * 100}%)`;
}, 3000);

</script>

</body>
</html>
