<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praboda & Dewmi — 16 July 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#fdfaf6;
  --bg2:#f7f0e8;
  --card:#fff;
  --accent:#c0514a;
  --accent2:#e8847e;
  --rose:#f9ede6;
  --teal:#2a9d8f;
  --ink:#1c1410;
  --muted:#8a7f78;
  --border:rgba(192,81,74,0.15);
}

*{margin:0;padding:0;box-sizing:border-box;}

html{
  scroll-behavior:smooth;
  scroll-snap-type:y mandatory;
}

body{
  font-family:'Jost',sans-serif;
  background:var(--bg);
  color:var(--ink);
  overflow-x:hidden;
}

/* CURSOR */
body{cursor:none;}
#cursor,#cursor-ring{position:fixed;pointer-events:none;z-index:9999;border-radius:50%;transform:translate(-50%,-50%);}
#cursor{width:10px;height:10px;background:var(--accent);}
#cursor-ring{width:38px;height:38px;border:1px solid var(--accent);opacity:.4;transition:.3s;}

/* INTRO */
#intro{
  position:fixed;inset:0;z-index:9000;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  text-align:center;
  transition:all 1s ease;
}

.intro-inner{animation:fadeUp 1.2s ease;}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}

.intro-names{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3rem,10vw,7rem);
}

.open-btn{
  margin-top:30px;
  padding:15px 40px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:50px;
  cursor:pointer;
}

/* HERO */
#hero{
  height:100vh;
  position:relative;
  display:flex;
  align-items:flex-end;
}

.hero-img{
  position:absolute;inset:0;
  background:url('image1.jpg') center/cover no-repeat;
  opacity:.6;
}

.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7),transparent);
}

.hero-content{
  position:relative;
  color:#fff;
  padding:60px;
}

.hero-names{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3rem,8vw,7rem);
}

/* SECTIONS */
section{
  padding:80px 30px;
  scroll-snap-align:start;
}

/* GALLERY FIXED */
.gallery-track{
  display:flex;
  gap:14px;
  transition:transform .7s ease;
}

.gallery-track img{
  width:300px;
  height:400px;
  object-fit:cover;
  border-radius:10px;
  transition:.4s;
}

.gallery-track img.active{
  transform:scale(1.05);
  filter:brightness(1.1);
}

.gallery-nav{
  margin-top:20px;
  text-align:center;
}

.gnav{
  padding:10px;
  cursor:pointer;
}

/* MOBILE FIX */
@media(max-width:600px){
  .hero-content{padding:30px;}
  .hero-names{font-size:2.5rem;}
}

/* RSVP */
.rsvp-btn{
  padding:15px 40px;
  background:var(--accent);
  color:#fff;
  border-radius:40px;
  text-decoration:none;
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
}
</style>
</head>

<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- INTRO -->
<div id="intro">
  <div class="intro-inner">
    <h1 class="intro-names">Praboda & Dewmi</h1>
    <button class="open-btn" onclick="openInvite()">Open Invitation</button>
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<!-- HERO -->
<section id="hero">
  <div class="hero-img"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h2 class="hero-names">Praboda & Dewmi</h2>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery">
  <div class="gallery-track" id="gtrack">
    <img src="image1.jpg">
    <img src="image2.jpg">
    <img src="image3.jpg">
    <img src="image1.jpg">
  </div>

  <div class="gallery-nav">
    <button class="gnav" id="gprev">←</button>
    <button class="gnav" id="gnext">→</button>
  </div>
</section>

<!-- RSVP -->
<section>
  <a class="rsvp-btn" href="https://wa.me/94772636665" target="_blank">
    Confirm via WhatsApp
  </a>
</section>

<footer>
  Praboda & Dewmi — 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
/* CURSOR */
const cur=document.getElementById('cursor');
const ring=document.getElementById('cursor-ring');

document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px';
  cur.style.top=e.clientY+'px';
  ring.style.left=e.clientX+'px';
  ring.style.top=e.clientY+'px';
});

/* INTRO */
function openInvite(){
  const intro=document.getElementById('intro');
  intro.style.transform='scale(1.1)';
  intro.style.opacity='0';

  setTimeout(()=>intro.style.display='none',1000);

  document.getElementById('music').play();

  confetti({
    particleCount:200,
    spread:120
  });
}

/* GALLERY */
const track=document.getElementById('gtrack');
const imgs=track.querySelectorAll('img');

let gIdx=0;

function updateGallery(){
  const width=imgs[0].getBoundingClientRect().width+14;
  track.style.transform=`translateX(-${gIdx*width}px)`;

  imgs.forEach(img=>img.classList.remove('active'));
  imgs[gIdx].classList.add('active');
}

function moveG(dir){
  gIdx=(gIdx+dir+imgs.length)%imgs.length;
  updateGallery();
}

document.getElementById('gnext').onclick=()=>moveG(1);
document.getElementById('gprev').onclick=()=>moveG(-1);

setInterval(()=>moveG(1),4000);

window.addEventListener('load',updateGallery);
window.addEventListener('resize',updateGallery);
</script>

</body>
</html>
