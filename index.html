<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fdf6f0;
  text-align: center;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #2b0000, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  z-index: 9999;
  transition: opacity 1s ease, transform 1s ease;
}

/* STARS */
#intro::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background-image:
    radial-gradient(circle, rgba(255,215,0,0.9) 2px, transparent 2px),
    radial-gradient(circle, rgba(255,255,255,0.8) 1.5px, transparent 2px);
  background-size: 80px 80px, 120px 120px;
}

#intro::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(circle, #fff 1px, transparent 1px);
  background-size: 60px 60px;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.3; }
  to { opacity: 1; }
}

/* SHOOTING STARS */
.shooting-star {
  position: absolute;
  width: 2px;
  height: 80px;
  background: linear-gradient(-45deg, white, transparent);
  transform: rotate(45deg);
  animation: shoot 6s linear infinite;
}

@keyframes shoot {
  0% { opacity:0; }
  10% { opacity:1; }
  100% { opacity:0; transform: translate(300px,300px) rotate(45deg);}
}

/* INTRO BOX */
.intro-box {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 25px;
  padding: 45px;
  border: 1px solid rgba(255,215,0,0.3);
  z-index: 2;
}

/* BUTTON */
.open-btn {
  padding: 14px 30px;
  border-radius: 50px;
  border: none;
  font-weight: bold;
  background: linear-gradient(45deg, gold, #ffcc70);
  cursor: pointer;
  transition: all 0.3s ease;
}

.open-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px gold;
}

/* HERO */
.hero {
  background: url('image1.jpg') center/cover no-repeat;
  height: 100vh;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding-top: 90px;
  background-color: rgba(0,0,0,0.5);
  background-blend-mode: darken;
}

/* SECTIONS */
.section {
  padding: 50px 20px;
  margin: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
}

/* COUNTDOWN */
.count-box {
  display: flex;
  justify-content: center;
  gap: 15px;
}

.count-box div {
  background: white;
  padding: 18px;
  border-radius: 15px;
}

/* ===== 🔥 FIXED GALLERY ===== */
.slider {
  width: 100%;
  max-width: 500px;
  height: 300px;
  margin: auto;
  overflow: hidden;
  border-radius: 15px;
  position: relative;
}

.slides {
  display: flex;
  width: 100%;
  height: 100%;
  transition: transform 0.6s ease-in-out;
}

.slides img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  flex: 0 0 100%;
}

/* MOBILE */
@media (max-width:600px){
  .slider {
    height: 220px;
  }
}

/* BUTTON */
.button {
  padding: 14px 22px;
  background: black;
  color: white;
  border-radius: 30px;
  text-decoration: none;
}

/* MUSIC */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px;
  border-radius: 50%;
  background: black;
  color: white;
  border: none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="shooting-star"></div>
  <div class="intro-box">
    <h2 style="color:white;">Praboda ❤️ Dewmi</h2>
    <p style="color:white;">YOU ARE INVITED</p>
    <button class="open-btn" onclick="openInvite()">Open Invitation</button>
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="hero">
  <h1>Praboda ❤️ Dewmi</h1>
  <h2 id="guestText"></h2>
</div>

<div class="section">
  <h2>Gallery</h2>
  <div class="slider">
    <div class="slides" id="slides">
      <img src="image1.jpg">
      <img src="image2.jpg">
      <img src="image3.jpg">
    </div>
  </div>
</div>

<script>

/* SLIDER FIXED */
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = slides.children.length;

setInterval(() => {
  index = (index + 1) % totalSlides;
  slides.style.transform = `translateX(-${index * 100}%)`;
}, 3000);

</script>

</body>
</html>
