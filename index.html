<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fdf6f0;
  color: #5a4a42;
  text-align: center;
}

/* ===== PREMIUM FIRST PAGE ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #8b0000, #3b0000);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.intro-content {
  text-align: center;
}

/* ENVELOPE */
.envelope {
  width: 300px;
  height: 190px;
  background: linear-gradient(135deg, #ff2a2a, #c40000);
  border-radius: 12px;
  position: relative;
  margin: auto;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  overflow: hidden;
}

/* TEXTURE */
.envelope::after {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.05),
    rgba(255,255,255,0.05) 2px,
    transparent 2px,
    transparent 6px
  );
  top: -50%;
  left: -50%;
}

/* GOLD BAND */
.envelope::before {
  content: "";
  position: absolute;
  top: 45%;
  width: 100%;
  height: 18px;
  background: linear-gradient(90deg,#d4af37,#ffd700,#caa520);
  z-index: 3;
}

/* SEAL */
.seal {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 80px;
  height: 80px;
  background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  color: gold;
  font-size: 16px;
  font-weight: bold;
  z-index: 4;
  box-shadow:
    0 10px 20px rgba(0,0,0,0.5),
    inset 0 2px 6px rgba(255,255,255,0.4),
    inset 0 -4px 8px rgba(0,0,0,0.4);
}

/* FLAP */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #d60000, #7a0000);
  clip-path: polygon(0 0, 100% 0, 50% 55%);
  transform-origin: top;
  transition: 0.9s;
  z-index: 2;
}

/* OPEN */
.open .flap {
  transform: rotateX(180deg);
}

/* TEXT */
.title {
  margin-top: 30px;
  font-family: 'Playfair Display', serif;
  color: #fff;
  font-size: 24px;
}

.subtitle {
  color: gold;
  font-size: 12px;
  letter-spacing: 3px;
  margin-top: 10px;
}

/* ===== HERO ===== */
.hero {
  background: url('image3.jpg') center/cover no-repeat;
  height: 100vh;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background-blend-mode: darken;
  background-color: rgba(0,0,0,0.5);
}

/* SECTION */
.section { padding: 40px 20px; }
.section:nth-child(even) { background: #fff; }
.section:nth-child(odd) { background: #f8efe8; }

/* COUNTDOWN */
.count-box {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.count-box div {
  background: white;
  padding: 15px;
  border-radius: 12px;
  min-width: 70px;
}

/* GALLERY */
.slider {
  width: 90%;
  margin: auto;
  overflow: hidden;
  border-radius: 15px;
}

.slides {
  display: flex;
  transition: transform 0.4s ease-in-out;
}

.slides img {
  width: 100%;
  flex-shrink: 0;
  border-radius: 15px;
}

/* BUTTON */
.button {
  padding: 14px 22px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 30px;
}

/* MUSIC */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px;
  border-radius: 50%;
  background: black;
  color: white;
  border: none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" onclick="openInvite()">
  <div class="intro-content">

    <div class="envelope">
      <div class="flap"></div>
      <div class="seal">P<br>&<br>D</div>
    </div>

    <h2 class="title">Royal Sri Lankan Invitation</h2>
    <p class="subtitle">BREAK THE SEAL TO REVEAL</p>

  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<div class="hero">
  <h1>Praboda ❤️ Dewmi</h1>
  <h2 id="guestText">We are getting married</h2>
</div>

<!-- SAVE DATE -->
<div class="section" style="background:black;color:white;">
  <h2>Save The Date</h2>
  <h1>16 • 07 • 2026</h1>
</div>

<!-- DETAILS -->
<div class="section">
  <h2>Wedding Details</h2>
  <p>📅 16th July 2026</p>
  <p>⏰ 10:00 AM – 4:00 PM</p>
  <p>📍 Hotel Nildiya, Matara</p>
  <div id="countdown" class="count-box"></div>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>Gallery</h2>
  <div class="slider">
    <div class="slides" id="slides">
      <img src="image1.jpg">
      <img src="image2.jpg">
      <img src="image3.jpg">
    </div>
  </div>
</div>

<!-- LOCATION -->
<div class="section">
  <h2>Location</h2>
  <iframe src="https://maps.google.com/maps?q=Hotel%20Nildiya%20Matara&output=embed"
  width="90%" height="250" style="border-radius:10px;"></iframe>
</div>

<!-- RSVP -->
<div class="section">
  <h2>RSVP</h2>
  <a class="button" id="rsvpBtn" href="#">Confirm via WhatsApp</a>
</div>

<!-- FOOTER -->
<div class="section">
  <p>With Love ❤️<br>Praboda & Dewmi</p>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* OPEN INVITE */
function openInvite() {
  document.querySelector('.envelope').classList.add('open');

  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("music").play();
    confetti({ particleCount: 150, spread: 90 });
  }, 1000);
}

/* MUSIC */
function toggleMusic() {
  var m = document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

/* COUNTDOWN */
var countDownDate = new Date("July 16, 2026 10:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var d = countDownDate - now;

  var days = Math.floor(d / (1000 * 60 * 60 * 24));
  var hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    `<div>${days}<br>Days</div>
     <div>${hours}<br>Hours</div>
     <div>${minutes}<br>Min</div>`;
}, 1000);

/* PERSONALIZED NAME */
const params = new URLSearchParams(window.location.search);
const guest = params.get("name");

if (guest) {
  document.getElementById("guestText").innerHTML =
    "Dear " + guest + ", you are invited 💌";

  document.getElementById("rsvpBtn").href =
    "https://wa.me/94772636665?text=Hi Praboda & Dewmi, I (" + guest + ") will attend your wedding!";
} else {
  document.getElementById("rsvpBtn").href =
    "https://wa.me/94772636665?text=Hi Praboda & Dewmi, I will attend your wedding!";
}

/* SLIDER */
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = slides.children.length;

setInterval(() => {
  index = (index + 1) % totalSlides;
  slides.style.transform = `translateX(-${index * 100}%)`;
}, 3000);

</script>

</body>
</html>
