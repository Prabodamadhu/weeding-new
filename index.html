<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fdf6f0;
  text-align: center;
}

/* ===== INTRO ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #2b0000, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  z-index: 9999;
  transition: opacity 1s ease, transform 1s ease;
}

/* STARS */
#intro::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background-image:
    radial-gradient(circle, rgba(255,215,0,0.9) 2px, transparent 2px),
    radial-gradient(circle, rgba(255,255,255,0.8) 1.5px, transparent 2px);
  background-size: 80px 80px, 120px 120px;
}

#intro::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(circle, #fff 1px, transparent 1px);
  background-size: 60px 60px;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.3; }
  to { opacity: 1; }
}

/* SHOOTING STARS */
.shooting-star {
  position: absolute;
  width: 2px;
  height: 80px;
  background: linear-gradient(-45deg, white, transparent);
  transform: rotate(45deg);
  animation: shoot 6s linear infinite;
}
.shooting-star:nth-child(1){top:10%;left:20%;animation-delay:1s;}
.shooting-star:nth-child(2){top:40%;left:70%;animation-delay:3s;}
.shooting-star:nth-child(3){top:70%;left:40%;animation-delay:5s;}

@keyframes shoot {
  0% { opacity:0; transform: translate(0,0) rotate(45deg);}
  10% { opacity:1;}
  100% { opacity:0; transform: translate(300px,300px) rotate(45deg);}
}

/* INTRO BOX */
.intro-box {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 25px;
  padding: 45px;
  border: 1px solid rgba(255,215,0,0.3);
  z-index: 2;
}

/* ✨ GOLD NAME ANIMATION */
.gold-text {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  background: linear-gradient(90deg, gold, #fff, gold);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine 3s linear infinite;
}

@keyframes shine {
  0% { background-position: 0%; }
  100% { background-position: 200%; }
}

.intro-sub { color:white; }

/* HERO */
.hero {
  background: url('image1.jpg') center/cover no-repeat;
  height: 100vh;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding-top: 90px;
  background-color: rgba(0,0,0,0.5);
  background-blend-mode: darken;
}

.section { padding:50px 20px; }

/* COUNTDOWN */
.count-box { display:flex; justify-content:center; gap:15px; }
.count-box div {
  background:white; padding:18px; border-radius:15px;
}

/* BUTTON */
.button {
  padding:14px 22px;
  background:black;
  color:white;
  border-radius:30px;
  text-decoration:none;
}

/* MUSIC BTN */
.music-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px;
  border-radius:50%;
  background:black;
  color:white;
  border:none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>

  <div class="intro-box">
    <h2 class="gold-text">Praboda ❤️ Dewmi</h2>
    <p class="intro-sub">YOU ARE INVITED</p>
    <button onclick="openInvite()">Open Invitation</button>
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<div class="hero">
  <h1 class="gold-text">Praboda ❤️ Dewmi</h1>
  <h2 id="guestText"></h2>
</div>

<div class="section">
  <h2>Wedding Details</h2>
  <div id="countdown" class="count-box"></div>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* 🎬 CINEMATIC OPEN */
function openInvite() {
  const intro = document.getElementById("intro");
  intro.style.opacity = "0";
  intro.style.transform = "scale(1.1)";

  setTimeout(() => {
    intro.style.display = "none";

    startMusicFade();
    goldConfetti();
    typeGuest();
  }, 1000);
}

/* 🎵 MUSIC FADE IN */
function startMusicFade() {
  const music = document.getElementById("music");
  music.volume = 0;
  music.play();

  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.05;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);
}

/* 💛 GOLD CONFETTI */
function goldConfetti() {
  confetti({
    particleCount: 200,
    spread: 100,
    colors: ['#FFD700','#FFF8DC','#FFEC8B']
  });
}

/* ✍️ TYPING EFFECT */
function typeGuest() {
  const params = new URLSearchParams(window.location.search);
  const guest = params.get("name") || "Dear Guest";

  const text = "Dear " + guest + ", you are invited 💌";
  let i = 0;

  const speed = 50;
  const el = document.getElementById("guestText");

  function type() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, speed);
    }
  }
  type();
}

/* COUNTDOWN */
var countDownDate = new Date("July 16, 2026 10:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var d = countDownDate - now;

  document.getElementById("countdown").innerHTML =
    `<div>${Math.floor(d/(1000*60*60*24))}<br>Days</div>`;
}, 1000);

/* MUSIC TOGGLE */
function toggleMusic(){
  var m=document.getElementById("music");
  m.paused?m.play():m.pause();
}

</script>

</body>
</html>
