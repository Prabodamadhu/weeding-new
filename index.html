<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
}

/* ===== INTRO ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #1a1a1a, #4b0000);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* Sparkle */
#intro::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(gold 1px, transparent 1px);
  background-size: 40px 40px;
  animation: sparkle 20s linear infinite;
  opacity: 0.3;
}

@keyframes sparkle {
  from { transform: translateY(0); }
  to { transform: translateY(-200px); }
}

/* Envelope */
.envelope {
  width: 280px;
  height: 180px;
  background: linear-gradient(135deg, #b30000, #5a0000);
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  box-shadow: 0 20px 50px rgba(0,0,0,0.7);
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg,#d40000,#7a0000);
  clip-path: polygon(0 0,100% 0,50% 60%);
  transform-origin: top;
  transition: 1s;
}

/* Letter */
.letter {
  position: absolute;
  width: 90%;
  height: 140px;
  background: white;
  top: 20px;
  left: 5%;
  border-radius: 8px;
  padding: 15px;
  box-sizing: border-box;
  transform: translateY(50px);
  transition: 1s;
}

.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  transform: translateY(-20px);
}

/* Button inside letter */
.open-btn {
  margin-top: 15px;
  padding: 8px 18px;
  border: none;
  background: gold;
  border-radius: 20px;
  font-weight: bold;
}

/* HERO */
.hero {
  background: url('image1.jpg') center/cover no-repeat;
  height: 100vh;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding-top: 90px;
  background-color: rgba(0,0,0,0.5);
  background-blend-mode: darken;
}

/* Sections */
.section { padding: 40px; }

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="envelope" id="env" onclick="openEnvelope()">
    <div class="flap"></div>

    <div class="letter">
      <b>Praboda ❤️ Dewmi</b><br><br>
      You are invited 💌<br><br>
      <button class="open-btn">Tap Envelope</button>
    </div>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Praboda ❤️ Dewmi</h1>
  <h2>We are getting married</h2>
</div>

<script>

/* OPEN ENVELOPE */
function openEnvelope() {
  document.getElementById("env").classList.add("open");

  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
  }, 1200);
}

</script>

</body>
</html>
