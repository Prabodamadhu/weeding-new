<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fdf6f0;
  color: #5a4a42;
  text-align: center;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* ENVELOPE */
.envelope {
  width: 250px;
  height: 150px;
  background: #c0392b;
  position: relative;
  cursor: pointer;
  border-radius: 10px;
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #e74c3c;
  clip-path: polygon(0 0, 100% 0, 50% 50%);
  transition: 0.6s;
}

.letter {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  transform: translateY(100%);
  transition: 0.6s;
}

.open .flap { transform: rotateX(180deg); }
.open .letter { transform: translateY(0); }

/* HERO (UPDATED IMAGE HERE) */
.hero {
  background: url('image3.jpg') center/cover no-repeat;
  height: 100vh;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background-blend-mode: darken;
  background-color: rgba(0,0,0,0.5);
  background-position: center top;
}

h1, h2 { font-family: 'Playfair Display', serif; }

/* SECTION */
.section { padding: 40px 20px; }
.section:nth-child(even) { background: #fff; }
.section:nth-child(odd) { background: #f8efe8; }

/* COUNTDOWN */
.count-box {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.count-box div {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  min-width: 70px;
}

/* GALLERY SLIDER */
.slider {
  width: 90%;
  margin: auto;
  overflow: hidden;
  border-radius: 15px;
}

.slides {
  display: flex;
  transition: transform 0.4s ease-in-out;
}

.slides img {
  width: 100%;
  flex-shrink: 0;
  border-radius: 15px;
}

/* BUTTON */
.button {
  padding: 14px 22px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 30px;
  display: inline-block;
}

/* MUSIC BUTTON */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px;
  border-radius: 50%;
  background: black;
  color: white;
  border: none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="envelope" onclick="openInvite()">
    <div class="flap"></div>
    <div class="letter">
      <h2>Tap to Open 💌</h2>
    </div>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<div class="hero">
  <h1>Praboda ❤️ Dewmi</h1>
  <h2 id="guestText">We are getting married</h2>
</div>

<!-- SAVE DATE -->
<div class="section" style="background:black;color:white;">
  <h2>Save The Date</h2>
  <h1>16 • 07 • 2026</h1>
</div>

<!-- DETAILS -->
<div class="section">
  <h2>Wedding Details</h2>
  <p>📅 16th July 2026</p>
  <p>⏰ 10:00 AM – 4:00 PM</p>
  <p>📍 Hotel Nildiya, Matara</p>
  <div id="countdown" class="count-box"></div>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>Gallery</h2>
  <div class="slider">
    <div class="slides" id="slides">
      <img src="image1.jpg">
      <img src="image2.jpg">
      <img src="image3.jpg">
    </div>
  </div>
</div>

<!-- LOCATION -->
<div class="section">
  <h2>Location</h2>
  <iframe src="https://maps.google.com/maps?q=Hotel%20Nildiya%20Matara&output=embed"
  width="90%" height="250" style="border-radius:10px;"></iframe>
</div>

<!-- RSVP -->
<div class="section">
  <h2>RSVP</h2>
  <a class="button" id="rsvpBtn" href="#">Confirm via WhatsApp</a>
</div>

<!-- FOOTER -->
<div class="section">
  <p>With Love ❤️<br>Praboda & Dewmi</p>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* OPEN INVITE */
function openInvite() {
  const env = document.querySelector('.envelope');
  env.classList.add('open');

  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("music").play();

    confetti({ particleCount: 120, spread: 80 });
  }, 1200);
}

/* MUSIC */
function toggleMusic() {
  var m = document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

/* COUNTDOWN */
var countDownDate = new Date("July 16, 2026 10:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var d = countDownDate - now;

  var days = Math.floor(d / (1000 * 60 * 60 * 24));
  var hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    `<div>${days}<br>Days</div>
     <div>${hours}<br>Hours</div>
     <div>${minutes}<br>Min</div>`;
}, 1000);

/* PERSONALIZED NAME */
const params = new URLSearchParams(window.location.search);
const guest = params.get("name");

if (guest) {
  document.getElementById("guestText").innerHTML =
    "Dear " + guest + ", you are invited 💌";

  document.getElementById("rsvpBtn").href =
    "https://wa.me/94772636665?text=Hi Praboda & Dewmi, I (" + guest + ") will attend your wedding!";
} else {
  document.getElementById("rsvpBtn").href =
    "https://wa.me/94772636665?text=Hi Praboda & Dewmi, I will attend your wedding!";
}

/* SLIDER */
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = slides.children.length;

setInterval(() => {
  index = (index + 1) % totalSlides;
  slides.style.transform = `translateX(-${index * 100}%)`;
}, 3000);

let startX = 0;

slides.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

slides.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) index = (index + 1) % totalSlides;
  else if (endX - startX > 50) index = (index - 1 + totalSlides) % totalSlides;

  slides.style.transform = `translateX(-${index * 100}%)`;
});

</script>

</body>
</html>
