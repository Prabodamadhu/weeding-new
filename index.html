<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fdf6f0;
  color: #5a4a42;
  text-align: center;
}

/* ===== INTRO ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #1a1a1a, #4b0000);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  overflow: hidden;
}

/* ✨ SPARKLES */
#intro::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(#ffd700 1px, transparent 1px);
  background-size: 40px 40px;
  animation: sparkleMove 25s linear infinite;
  opacity: 0.35;
}

#intro::after {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(#ffecb3 1px, transparent 1px);
  background-size: 60px 60px;
  animation: sparkleMoveReverse 35s linear infinite;
  opacity: 0.25;
}

@keyframes sparkleMove {
  from { transform: translateY(0); }
  to { transform: translateY(-300px); }
}

@keyframes sparkleMoveReverse {
  from { transform: translateY(0); }
  to { transform: translateY(300px); }
}

/* ===== SHIMMER EFFECT ===== */
.shimmer {
  font-family: 'Playfair Display', serif;
  background: linear-gradient(
    90deg,
    #d4af37 0%,
    #ffd700 25%,
    #ffffff 50%,
    #ffd700 75%,
    #d4af37 100%
  );
  background-size: 200% auto;
  color: transparent;
  -webkit-background-clip: text;
  background-clip: text;
  animation: shimmerMove 3s linear infinite;
}

@keyframes shimmerMove {
  to {
    background-position: 200% center;
  }
}

/* Intro Box */
.intro-box {
  position: relative;
  z-index: 2;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 40px 30px;
  width: 85%;
  max-width: 350px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.intro-sub {
  color: #d4af37;
  letter-spacing: 2px;
  font-size: 12px;
  margin-bottom: 30px;
}

.open-btn {
  padding: 14px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg,#d4af37,#ffd700);
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* ===== HERO ===== */
.hero {
  background: url('image1.jpg') center/cover no-repeat;
  height: 100vh;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding-top: 90px;
  background-blend-mode: darken;
  background-color: rgba(0,0,0,0.5);
}

.hero h1 {
  font-size: 34px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.7);
}

.hero h2 {
  font-size: 18px;
  text-shadow: 0 3px 10px rgba(0,0,0,0.6);
}

/* SECTION */
.section { padding: 40px 20px; }
.section:nth-child(even) { background: #fff; }
.section:nth-child(odd) { background: #f8efe8; }

/* COUNTDOWN */
.count-box {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.count-box div {
  background: white;
  padding: 15px;
  border-radius: 12px;
}

/* GALLERY */
.slider {
  width: 90%;
  margin: auto;
  overflow: hidden;
  border-radius: 15px;
}

.slides {
  display: flex;
  transition: 0.4s;
}

.slides img {
  width: 100%;
}

/* BUTTON */
.button {
  padding: 14px 22px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 30px;
}

/* MUSIC */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px;
  border-radius: 50%;
  background: black;
  color: white;
  border: none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-box">
    <h2 class="shimmer">Praboda ❤️ Dewmi</h2>
    <p class="intro-sub">YOU ARE INVITED</p>
    <button class="open-btn" onclick="openInvite()">Open Invitation</button>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<div class="hero">
  <h1 class="shimmer">Praboda ❤️ Dewmi</h1>
  <h2 id="guestText">We are getting married</h2>
</div>

<!-- SAVE DATE -->
<div class="section" style="background:black;color:white;">
  <h2>Save The Date</h2>
  <h1>16 • 07 • 2026</h1>
</div>

<!-- DETAILS -->
<div class="section">
  <h2>Wedding Details</h2>
  <p>📅 16th July 2026</p>
  <p>⏰ 10:00 AM – 4:00 PM</p>
  <p>📍 Hotel Nildiya, Matara</p>
  <div id="countdown" class="count-box"></div>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>Gallery</h2>
  <div class="slider">
    <div class="slides" id="slides">
      <img src="image1.jpg">
      <img src="image2.jpg">
      <img src="image3.jpg">
    </div>
  </div>
</div>

<!-- LOCATION -->
<div class="section">
  <h2>Location</h2>
  <iframe src="https://maps.google.com/maps?q=Hotel%20Nildiya%20Matara&output=embed"
  width="90%" height="250" style="border-radius:10px;"></iframe>
</div>

<!-- RSVP -->
<div class="section">
  <h2>RSVP</h2>
  <a class="button" id="rsvpBtn" href="#">Confirm via WhatsApp</a>
</div>

<!-- FOOTER -->
<div class="section">
  <p>With Love ❤️<br>Praboda & Dewmi</p>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

function openInvite() {
  document.getElementById("intro").style.opacity = "0";

  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("music").play();
    confetti({ particleCount: 150, spread: 90 });
  }, 800);
}

function toggleMusic() {
  var m = document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

</script>

</body>
</html>
