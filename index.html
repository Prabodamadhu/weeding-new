<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>
<style>
body {
  font-family: 'Arial', sans-serif;
  text-align: center;
  margin: 0;
  padding: 0;
  background: #f2f2f2; /* simple background */
  color: #333;
}

/* Guest Name VIP Style */
#guest-name {
  color: #d4af37; /* gold */
  font-weight: bold;
  font-size: 2em;
  margin-top: 30px;
  text-shadow: 1px 1px 2px #000;
}

/* Language Toggle */
.lang { display: none; }
.lang.en { display: block; }

button {
  margin: 20px;
  padding: 10px 20px;
  font-size: 1em;
  cursor: pointer;
  border-radius: 8px;
  border:none;
  background-color: #d4af37;
  color: white;
}
</style>
</head>
<body>

<!-- VIP Guest Name -->
<h2 id="guest-name">Dear Guest</h2>

<!-- Language Toggle Button -->
<button id="lang-toggle">සිංහල / English</button>

<!-- Invitation Text -->
<p class="lang en">We warmly invite you to celebrate our wedding!</p>
<p class="lang si">අපගේ විවාහයට ඔබ සාදරයෙන් ආරාධනා කරනවා!</p>

<script>
// 1️⃣ Guest Name from URL
const params = new URLSearchParams(window.location.search);
const guest = params.get('guest');
if(guest){
  document.getElementById('guest-name').textContent = `Dear ${guest}`;
}

// 2️⃣ Language Toggle
const toggle = document.getElementById('lang-toggle');
toggle.addEventListener('click', () => {
  document.querySelectorAll('.lang.en').forEach(el => el.style.display = el.style.display === 'none' ? 'block' : 'none');
  document.querySelectorAll('.lang.si').forEach(el => el.style.display = el.style.display === 'none' ? 'block' : 'none');
});
</script>

</body>
</html>
