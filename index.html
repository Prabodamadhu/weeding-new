<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fdf6f0;
  text-align: center;
}

/* ===== INTRO (UPGRADED) ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #2b0000, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  z-index: 9999;
}

/* ⭐ STAR LAYER */
#intro::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;

  background-image:
    radial-gradient(circle, rgba(255,215,0,0.9) 2px, transparent 2px),
    radial-gradient(circle, rgba(255,255,255,0.7) 1.5px, transparent 2px);

  background-size: 80px 80px, 120px 120px;
  background-position: 0 0, 40px 40px;

  animation: starsGlow 3s ease-in-out infinite alternate;
}

/* ⭐ GLOW ANIMATION */
@keyframes starsGlow {
  0% {
    opacity: 0.6;
    filter: drop-shadow(0 0 3px gold);
  }
  100% {
    opacity: 1;
    filter: drop-shadow(0 0 10px gold);
  }
}

/* 💎 PREMIUM INTRO BOX */
.intro-box {
  position: relative;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 25px;
  padding: 45px 35px;
  box-shadow: 0 25px 80px rgba(0,0,0,0.7);
  border: 1px solid rgba(255,215,0,0.25);
  z-index: 2;
}

.intro-title {
  font-family: 'Playfair Display', serif;
  color: #fff;
}

.intro-sub {
  color: white;
  margin-bottom: 20px;
}

.open-btn {
  padding: 14px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, gold, #ffcc70);
  cursor: pointer;
  font-weight: bold;
}

/* HERO */
.hero {
  background: url('image1.jpg') center/cover no-repeat;
  height: 100vh;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding-top: 90px;
  background-color: rgba(0,0,0,0.5);
  background-blend-mode: darken;
}

/* SECTIONS */
.section {
  padding: 50px 20px;
}

/* COUNTDOWN */
.count-box {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
}

.count-box div {
  background: white;
  padding: 18px;
  border-radius: 15px;
  min-width: 80px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  font-weight: bold;
}

/* GALLERY */
.slider {
  width: 90%;
  margin: auto;
  overflow: hidden;
  border-radius: 15px;
}

.slides {
  display: flex;
  transition: transform 0.6s ease-in-out;
}

.slides img {
  width: 100%;
  flex-shrink: 0;
  border-radius: 15px;
}

/* BUTTON */
.button {
  padding: 14px 22px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 30px;
}

/* MUSIC */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px;
  border-radius: 50%;
  background: black;
  color: white;
  border: none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-box">
    <h2 class="intro-title">Praboda ❤️ Dewmi</h2>
    <p class="intro-sub">YOU ARE INVITED</p>
    <button class="open-btn" onclick="openInvite()">Open Invitation</button>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<div class="hero">
  <h1>Praboda ❤️ Dewmi</h1>
  <h2 id="guestText">We are getting married</h2>
</div>

<!-- SAVE DATE -->
<div class="section" style="background:black;color:white;">
  <h2>Save The Date</h2>
  <h1>16 • 07 • 2026</h1>
</div>

<!-- DETAILS -->
<div class="section">
  <h2>Wedding Details</h2>
  <p>📅 16th July 2026</p>
  <p>⏰ 10:00 AM – 4:00 PM</p>
  <p>📍 Hotel Nildiya, Matara</p>
  <div id="countdown" class="count-box"></div>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>Gallery</h2>
  <div class="slider">
    <div class="slides" id="slides">
      <img src="image1.jpg">
      <img src="image2.jpg">
      <img src="image3.jpg">
    </div>
  </div>
</div>

<!-- LOCATION -->
<div class="section">
  <h2>Location</h2>
  <iframe src="https://maps.google.com/maps?q=Hotel%20Nildiya%20Matara&output=embed"
  width="90%" height="250" style="border-radius:15px;"></iframe>
</div>

<!-- RSVP -->
<div class="section">
  <h2>RSVP</h2>
  <a class="button" id="rsvpBtn" href="#">Confirm via WhatsApp</a>
</div>

<!-- FOOTER -->
<div class="section">
  <p>With Love ❤️<br>Praboda & Dewmi</p>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* OPEN INVITE */
function openInvite() {
  document.getElementById("intro").style.opacity = "0";

  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("music").play();
    confetti({ particleCount: 150, spread: 90 });
  }, 800);
}

/* MUSIC */
function toggleMusic() {
  var m = document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

/* COUNTDOWN */
var countDownDate = new Date("July 16, 2026 10:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var d = countDownDate - now;

  var days = Math.floor(d / (1000 * 60 * 60 * 24));
  var hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    `<div>${days}<br>Days</div>
     <div>${hours}<br>Hours</div>
     <div>${minutes}<br>Min</div>`;
}, 1000);

/* PERSONALIZED NAME */
const params = new URLSearchParams(window.location.search);
const guest = params.get("name");

if (guest) {
  document.getElementById("guestText").innerHTML =
    "Dear " + guest + ", you are invited 💌";

  document.getElementById("rsvpBtn").href =
    "https://wa.me/94772636665?text=Hi Praboda & Dewmi, I (" + guest + ") will attend your wedding!";
} else {
  document.getElementById("rsvpBtn").href =
    "https://wa.me/94772636665?text=Hi Praboda & Dewmi, I will attend your wedding!";
}

/* SLIDER */
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = slides.children.length;

setInterval(() => {
  index = (index + 1) % totalSlides;
  slides.style.transform = `translateX(-${index * 100}%)`;
}, 3000);

</script>

</body>
</html>
