<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
}

/* ===== ROYAL RED BACKGROUND ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #8b0000, #2a0000);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  z-index: 9999;
}

/* ENVELOPE */
.envelope {
  width: 320px;
  height: 200px;
  background: linear-gradient(135deg, #ff1a1a, #b30000);
  border-radius: 12px;
  position: relative;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  overflow: hidden;
}

/* FLAP TRIANGLE */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #ff3333, #990000);
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transition: 0.8s;
  transform-origin: top;
  z-index: 3;
}

/* GOLD BAND */
.band {
  position: absolute;
  width: 100%;
  height: 50px;
  background: linear-gradient(to right, #c9a23f, #f5d76e, #c9a23f);
  top: 50%;
  transform: translateY(-50%);
  z-index: 2;
}

/* SEAL */
.seal {
  position: absolute;
  width: 70px;
  height: 70px;
  background: radial-gradient(circle, #ff4d4d, #800000);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 4;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: gold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

/* LETTER */
.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: white;
  top: 5%;
  left: 5%;
  border-radius: 10px;
  transform: translateY(110%);
  transition: 0.8s;
  z-index: 1;
}

/* OPEN EFFECT */
.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  transform: translateY(0);
}

.open .seal {
  opacity: 0;
}

/* TEXT BELOW */
.title {
  margin-top: 30px;
  font-family: 'Playfair Display', serif;
  font-size: 24px;
}

.subtitle {
  font-size: 12px;
  letter-spacing: 2px;
  color: gold;
  margin-top: 10px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" onclick="openInvite()">

  <div class="envelope">
    <div class="flap"></div>
    <div class="band"></div>
    <div class="seal">P<br>&<br>D</div>
    <div class="letter"></div>
  </div>

  <div class="title">Royal Sri Lankan Invitation</div>
  <div class="subtitle">BREAK THE SEAL TO REVEAL</div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

function openInvite() {
  document.querySelector('.envelope').classList.add('open');

  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("music").play();
  }, 1200);
}

</script>

</body>
</html>
