<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fdf6f0;
  text-align: center;
}

/* ===== INTRO ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #1a1a1a, #4b0000);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.intro-box {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 40px 30px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.intro-title {
  font-family: 'Playfair Display', serif;
  color: white;
  font-size: 36px;
}

.intro-sub {
  color: white;
  margin-bottom: 20px;
}

.open-btn {
  padding: 14px 25px;
  border-radius: 30px;
  border: none;
  background: gold;
  cursor: pointer;
}

/* ===== SHIMMER GOLD NAMES ===== */
.shimmer {
  background: linear-gradient(90deg,#d4af37,#fff,#ffd700,#d4af37);
  background-size: 200%;
  -webkit-background-clip: text;
  color: transparent;
  animation: shine 3s linear infinite;
}
@keyframes shine { to {background-position:200%;} }

.heart { color: red; }

/* ===== HERO ===== */
.hero {
  background: url('image1.jpg') center/cover no-repeat;
  height: 100vh;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding-top: 90px;
  background-color: rgba(0,0,0,0.5);
  background-blend-mode: darken;
}

.hero h1 { font-size: 36px; }
.hero h2 { font-size: 18px; }

/* ===== SECTIONS ===== */
.section { padding: 50px 20px; }

/* ===== COUNTDOWN ===== */
.count-box {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
}

.count-box div {
  background: white;
  padding: 18px;
  border-radius: 15px;
  min-width: 80px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  font-weight: bold;
}

/* ===== GALLERY ===== */
.slider {
  width: 90%;
  margin: auto;
  overflow: hidden;
  border-radius: 15px;
}

.slides {
  display: flex;
  transition: transform 0.6s ease-in-out;
}

.slides img {
  width: 100%;
  flex-shrink: 0;
  border-radius: 15px;
}

/* ===== BUTTON ===== */
.button {
  padding: 14px 22px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 30px;
}

/* ===== MUSIC ===== */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px;
  border-radius: 50%;
  background: black;
  color: white;
  border: none;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-box">
    <h2 class="intro-title">
      <span class="shimmer">Praboda</span>
      <span class="heart"> ❤️ </span>
      <span class="shimmer">Dewmi</span>
    </h2>
    <p class="intro-sub">YOU ARE INVITED</p>
    <button class="open-btn" onclick="openInvite()">Open Invitation</button>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<div class="hero">
  <h1>
    <span class="shimmer">Praboda</span>
    <span class="heart"> ❤️ </span>
    <span class="shimmer">Dewmi</span>
  </h1>
  <h2 id="guestText">We are getting married</h2>
</div>

<!-- SAVE THE DATE -->
<div class="section" style="background:black;color:white;">
  <h2>Save The Date</h2>
  <h1>16 • 07 • 2026</h1>
</div>

<!-- DETAILS -->
<div class="section">
  <h2>Wedding Details</h2>
  <p>📅 16th July 2026</p>
  <p>⏰ 10:00 AM – 4:00 PM</p>
  <p>📍 Hotel Nildiya, Matara</p>
  <div id="countdown" class="count-box"></div>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>Gallery</h2>
  <div class="slider">
    <div class="slides" id="slides">
      <img src="image1.jpg">
      <img src="image2.jpg">
      <img src="image3.jpg">
    </div>
  </div>
</div>

<!-- LOCATION -->
<div class="section">
  <h2>Location</h2>
  <iframe src="https://maps.google.com/maps?q=Hotel%20Nildiya%20Matara&output=embed"
  width="90%" height="250" style="border-radius:15px;"></iframe>
</div>

<!-- RSVP -->
<div class="section">
  <h2>RSVP</h2>
  <a class="button" id="rsvpBtn" href="#">Confirm via WhatsApp</a>
</div>

<!-- FOOTER -->
<div class="section">
  <p>With Love ❤️<br>Praboda & Dewmi</p>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
/* OPEN INVITE */
function openInvite() {
  document.getElementById("intro").style.opacity = "0";
  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("music").play();
    confetti({ particleCount: 150, spread: 90 });
  }, 800);
}

/* MUSIC */
function toggleMusic() {
  var m = document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

/* COUNTDOWN */
var countDownDate = new Date("July 16, 2026 10:00:00").getTime();
setInterval(function() {
  var now = new Date().getTime();
  var d = countDownDate - now;
  var days = Math.floor(d / (1000 * 60 * 60 * 24));
  var hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
  document.getElementById("countdown").innerHTML =
    `<div>${days}<br>Days</div>
     <div>${hours}<br>Hours</div>
     <div>${minutes}<br>Min</div>`;
}, 1000);

/* PERSONALIZED NAME */
const params = new URLSearchParams(window.location.search);
const guest = params.get("name");
if (guest) {
  document.getElementById("guestText").innerHTML =
    "Dear " + guest + ", you are invited 💌";
  document.getElementById("rsvpBtn").href =
    "https://wa.me/94772636665?text=Hi Praboda & Dewmi, I (" + guest + ") will attend your wedding!";
} else {
  document.getElementById("rsvpBtn").href =
    "https://wa.me/94772636665?text=Hi Praboda & Dewmi, I will attend your wedding!";
}

/* SLIDER */
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = slides.children.length;
setInterval(() => {
  index = (index + 1) % totalSlides;
  slides.style.transform = `translateX(-${index * 100}%)`;
}, 3000);
</script>

</body>
</html>
