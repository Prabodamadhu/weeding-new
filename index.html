<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Praboda & Dewmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ===== GENERAL ===== */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fdf6f0;
  color: #5a4a42;
  text-align: center;
}

/* ===== FIRST PAGE ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #7a0000, #3d0000);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.invite-container {
  text-align: center;
  cursor: pointer;
}

.envelope {
  width: 300px;
  height: 180px;
  background: linear-gradient(145deg, #c40000, #7a0000);
  border-radius: 12px;
  position: relative;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

/* GOLD BAND */
.envelope::before {
  content: '';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 100%;
  height: 26px;
  background: linear-gradient(90deg, #d4af37, #ffd700, #d4af37);
  box-shadow: inset 0 2px 5px rgba(255,255,255,0.4);
}

/* GOLD SEAL */
.seal {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 75px;
  height: 75px;
  border-radius: 50%;
  background: radial-gradient(circle, #ffd700, #c9a227);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  color: #7a0000;
  font-weight: bold;
  box-shadow: 0 6px 15px rgba(0,0,0,0.5);
  z-index: 3;
}

/* FLAP */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #6a0000;
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transition: 0.8s;
}

/* LETTER */
.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: white;
  top: 5%;
  left: 5%;
  border-radius: 10px;
  transform: translateY(100%);
  transition: 0.8s;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.open .flap { transform: rotateX(180deg); }
.open .letter { transform: translateY(0); }

/* ===== HERO ===== */
.hero {
  background: url('image1.jpg') center/cover no-repeat;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  color: white;
  background-blend-mode: darken;
  background-color: rgba(0,0,0,0.5);
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
}

/* ===== SECTIONS ===== */
.section {
  padding: 60px 20px;
}

.section:nth-child(even) {
  background: #ffffff;
}

.section:nth-child(odd) {
  background: #f8efe8;
}

/* ===== GLASS CARD ===== */
.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 20px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* ===== COUNTDOWN ===== */
.count-box {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
}

.count-box div {
  background: white;
  padding: 15px;
  border-radius: 12px;
  min-width: 70px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* ===== GALLERY ===== */
.slider {
  width: 90%;
  margin: auto;
  overflow: hidden;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.slides {
  display: flex;
  transition: transform 0.4s ease;
}

.slides img {
  width: 100%;
  height: 350px;
  object-fit: cover;
}

/* ===== BUTTON ===== */
.button {
  padding: 14px 28px;
  background: linear-gradient(135deg, #000, #333);
  color: white;
  text-decoration: none;
  border-radius: 30px;
  transition: 0.3s;
}

.button:hover {
  transform: scale(1.05);
}

/* ===== MUSIC ===== */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: black;
  color: white;
  border-radius: 50%;
  padding: 12px;
  border: none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="invite-container" onclick="openInvite()">
    <div class="envelope">
      <div class="flap"></div>
      <div class="seal">P & D</div>
      <div class="letter">
        <h2>Praboda ❤️ Dewmi</h2>
        <p>Tap to Open</p>
      </div>
    </div>
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<!-- HERO -->
<div class="hero">
  <h1>Praboda ❤️ Dewmi</h1>
  <h2 id="guestText">We are getting married</h2>
</div>

<!-- SAVE DATE -->
<div class="section">
  <div class="card">
    <h2>Save The Date</h2>
    <h1>16 • 07 • 2026</h1>
  </div>
</div>

<!-- DETAILS -->
<div class="section">
  <div class="card">
    <h2>Wedding Details</h2>
    <p>📅 16th July 2026</p>
    <p>⏰ 10:00 AM – 4:00 PM</p>
    <p>📍 Hotel Nildiya, Matara</p>
    <div id="countdown" class="count-box"></div>
  </div>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>Gallery</h2>
  <div class="slider">
    <div class="slides" id="slides">
      <img src="image1.jpg">
      <img src="image2.jpg">
      <img src="image3.jpg">
    </div>
  </div>
</div>

<!-- LOCATION -->
<div class="section">
  <h2>Location</h2>
  <iframe src="https://maps.google.com/maps?q=Hotel%20Nildiya%20Matara&output=embed"
  width="90%" height="250" style="border-radius:10px;"></iframe>
</div>

<!-- RSVP -->
<div class="section">
  <h2>RSVP</h2>
  <a class="button" id="rsvpBtn">Confirm via WhatsApp</a>
</div>

<!-- FOOTER -->
<div class="section">
  <p>With Love ❤️<br>Praboda & Dewmi</p>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script>

/* OPEN INVITE */
function openInvite() {
  document.querySelector('.envelope').classList.add('open');

  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("music").play();
  }, 1200);
}

/* MUSIC */
function toggleMusic() {
  let m = document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

/* COUNTDOWN */
let countDownDate = new Date("July 16, 2026 10:00:00").getTime();

setInterval(() => {
  let now = new Date().getTime();
  let d = countDownDate - now;

  let days = Math.floor(d / (1000*60*60*24));
  let hours = Math.floor((d%(1000*60*60*24))/(1000*60*60));
  let minutes = Math.floor((d%(1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML =
  `<div>${days}<br>Days</div>
   <div>${hours}<br>Hours</div>
   <div>${minutes}<br>Min</div>`;
},1000);

/* RSVP */
const params = new URLSearchParams(window.location.search);
const guest = params.get("name");

if (guest) {
  document.getElementById("guestText").innerHTML =
  "Dear " + guest + ", you are invited 💌";

  document.getElementById("rsvpBtn").href =
  "https://wa.me/94772636665?text=Hi I ("+guest+") will attend!";
} else {
  document.getElementById("rsvpBtn").href =
  "https://wa.me/94772636665?text=Hi I will attend!";
}

/* SLIDER */
let index=0;
let slides=document.getElementById("slides");

setInterval(()=>{
  index=(index+1)%3;
  slides.style.transform=`translateX(-${index*100}%)`;
},3000);

</script>

</body>
</html>
