<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Royal Sri Lankan Invitation | Praboda & Dewmi</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;overflow-x:hidden;}

/* FIRST PAGE */
.invitation-first-page{
position:fixed;width:100%;height:100%;
background:linear-gradient(135deg,#8b1a1a,#5e0e0e);
display:flex;justify-content:center;align-items:center;
z-index:10000;transition:.8s;
}

.invitation-first-page.hide{
opacity:0;visibility:hidden;
}

.invitation-card{
background:rgba(255,245,235,0.95);
padding:3rem 2rem;
border-radius:60px;
text-align:center;
box-shadow:0 40px 60px rgba(0,0,0,0.4);
max-width:550px;width:90%;
}

.couple-name-large{
font-family:'Cormorant Garamond',serif;
font-size:3.5rem;color:#5e1a0f;
}

.invitation-text{
margin:15px 0;font-style:italic;
}

.seal-circle{
width:130px;height:130px;
margin:30px auto;
border-radius:50%;
background:radial-gradient(circle,#ffd700,#c1851e);
display:flex;align-items:center;justify-content:center;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
transition:.2s;
}

.seal-circle:active{transform:scale(.95);}

/* SECOND PAGE */
.main-wedding-page{display:none;background:#fef7ef;}
.main-wedding-page.show{display:block;}

.hero{
height:100vh;
display:flex;flex-direction:column;justify-content:center;align-items:center;
background:url('https://images.pexels.com/photos/261102/pexels-photo-261102.jpeg') center/cover;
color:white;text-align:center;
}

.section{padding:60px 20px;}
.button{background:#b8860b;color:white;padding:14px 30px;border-radius:50px;text-decoration:none;}
</style>
</head>

<body>

<!-- FIRST PAGE -->
<div id="firstPage" class="invitation-first-page">
<div class="invitation-card">
<div class="couple-name-large">Praboda & Dewmi</div>

<div class="invitation-text">
Request the honour of your presence
</div>

<div id="sealCircle" class="seal-circle">
BREAK
</div>
</div>
</div>

<!-- SECOND PAGE -->
<div id="secondPage" class="main-wedding-page">

<div class="hero">
<h1>Praboda ❤️ Dewmi</h1>
<p id="guestText">We are getting married</p>
</div>

<div class="section">
<h2>Wedding Details</h2>
<p>📅 16 July 2026</p>
<p>⏰ 10:00 AM</p>
<p>📍 Hotel Nildiya</p>
</div>

<div class="section">
<a id="rsvpBtn" class="button">Confirm via WhatsApp</a>
</div>

</div>

<audio id="bgMusic" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const firstPage = document.getElementById('firstPage');
const secondPage = document.getElementById('secondPage');
const seal = document.getElementById('sealCircle');
const audio = document.getElementById('bgMusic');

let opened = false;

seal.addEventListener('click', function(){

if(opened) return;
opened = true;

/* CONFETTI */
confetti({
particleCount:200,
spread:100,
origin:{y:0.5}
});

/* TRANSITION */
setTimeout(()=>{
firstPage.classList.add('hide');

setTimeout(()=>{
firstPage.style.display='none';
secondPage.classList.add('show');

/* PLAY MUSIC */
audio.muted = false;
audio.play().catch(()=>{});

},800);

},400);

});

/* PERSONALIZED NAME */
const params = new URLSearchParams(window.location.search);
const guest = params.get("name");

const guestText = document.getElementById("guestText");
const rsvpBtn = document.getElementById("rsvpBtn");

if(guest){
guestText.innerHTML = "Dear "+guest+", you are invited 💌";
rsvpBtn.href = "https://wa.me/94772636665?text=Hi I ("+guest+") will attend";
}else{
rsvpBtn.href = "https://wa.me/94772636665?text=I will attend";
}

</script>

</body>
</html>
